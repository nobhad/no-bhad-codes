<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      (function () {
        try {
          var saved = localStorage.getItem('theme');
          var systemDark =
            window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme = saved || (systemDark ? 'dark' : 'light');
          document.documentElement.setAttribute('data-theme', theme);
          var color = theme === 'dark' ? '#333333' : '#e0e0e0';
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta) meta.setAttribute('content', color);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'light');
        }
      })();
    </script>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#e0e0e0" />
    <meta name="robots" content="noindex" />
    <title>404 — No Bhad Codes</title>
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <style>
      @font-face {
        font-family: 'Acme';
        src:
          url('/fonts/Acme/Acme-Regular.woff2') format('woff2'),
          url('/fonts/Acme/Acme-Regular.ttf') format('truetype');
        font-weight: 400;
        font-style: normal;
        font-display: swap;
      }

      :root {
        --nf-bg: #e0e0e0;
        --nf-fg: #1a1a1a;
        --nf-muted: #555555;
        --nf-accent: #dc2626;
        --nf-border: #1a1a1a;
        --nf-btn-bg: #1a1a1a;
        --nf-btn-fg: #e0e0e0;
      }

      html[data-theme='dark'] {
        --nf-bg: #333333;
        --nf-fg: #f0f0f0;
        --nf-muted: #b0b0b0;
        --nf-accent: #ef4444;
        --nf-border: #f0f0f0;
        --nf-btn-bg: #f0f0f0;
        --nf-btn-fg: #1a1a1a;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        font-family:
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          'Segoe UI',
          sans-serif;
        background: var(--nf-bg);
        color: var(--nf-fg);
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        min-height: 100dvh;
        transition:
          background-color 0.35s ease,
          color 0.35s ease;
      }

      .nf-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem clamp(1rem, 4vw, 2rem);
        border-bottom: 1px solid color-mix(in srgb, var(--nf-border) 18%, transparent);
      }

      .nf-brand {
        font-family: 'Acme', system-ui, sans-serif;
        font-size: clamp(1.1rem, 2.5vw, 1.4rem);
        letter-spacing: 0.04em;
        text-transform: uppercase;
        text-decoration: none;
        color: var(--nf-fg);
      }

      .nf-theme {
        appearance: none;
        background: transparent;
        border: 1px solid color-mix(in srgb, var(--nf-border) 35%, transparent);
        color: var(--nf-fg);
        width: 2.5rem;
        height: 2.5rem;
        border-radius: 999px;
        cursor: pointer;
        display: grid;
        place-items: center;
      }

      .nf-theme:hover {
        border-color: var(--nf-accent);
        color: var(--nf-accent);
      }

      .nf-theme svg {
        width: 1.1rem;
        height: 1.1rem;
        stroke: currentColor;
        fill: none;
        stroke-width: 2;
      }

      html[data-theme='light'] .nf-theme .icon-sun {
        display: none;
      }

      html[data-theme='dark'] .nf-theme .icon-moon {
        display: none;
      }

      .nf-main {
        flex: 1;
        display: grid;
        place-items: center;
        padding: clamp(1.5rem, 5vw, 3rem);
      }

      .nf-card {
        width: min(100%, 40rem);
        text-align: center;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: clamp(1.25rem, 3vw, 2rem);
      }

      .nf-sign {
        width: min(100%, 22rem);
        height: auto;
        filter: drop-shadow(0.6rem 0.75rem 0 color-mix(in srgb, var(--nf-fg) 18%, transparent));
        transform-origin: 70% 100%;
        animation: nf-sway 5.5s ease-in-out infinite;
      }

      @keyframes nf-sway {
        0%,
        100% {
          transform: rotate(-1.6deg) translateY(0);
        }
        50% {
          transform: rotate(1.8deg) translateY(-0.35rem);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .nf-sign {
          animation: none;
        }
      }

      .nf-copy {
        display: flex;
        flex-direction: column;
        gap: 0.75rem;
        max-width: 28rem;
      }

      .nf-eyebrow {
        font-family: 'Acme', system-ui, sans-serif;
        font-size: 0.85rem;
        letter-spacing: 0.18em;
        text-transform: uppercase;
        color: var(--nf-accent);
      }

      .nf-title {
        font-family: 'Acme', system-ui, sans-serif;
        font-size: clamp(2rem, 6vw, 3.25rem);
        line-height: 1.05;
        letter-spacing: 0.02em;
        text-transform: uppercase;
      }

      .nf-body {
        font-size: clamp(0.95rem, 2.2vw, 1.1rem);
        line-height: 1.55;
        color: var(--nf-muted);
      }

      .nf-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
      }

      .nf-btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.4rem;
        min-height: 2.75rem;
        padding: 0.65rem 1.35rem;
        border: 1.5px solid var(--nf-border);
        text-decoration: none;
        font-family: 'Acme', system-ui, sans-serif;
        font-size: 1rem;
        letter-spacing: 0.04em;
        text-transform: uppercase;
        transition:
          transform 0.18s ease,
          background-color 0.18s ease,
          color 0.18s ease;
      }

      .nf-btn--primary {
        background: var(--nf-btn-bg);
        color: var(--nf-btn-fg);
      }

      .nf-btn--ghost {
        background: transparent;
        color: var(--nf-fg);
      }

      .nf-btn:hover {
        transform: translateY(-2px);
      }

      .nf-btn--ghost:hover {
        border-color: var(--nf-accent);
        color: var(--nf-accent);
      }

      .nf-footer {
        padding: 1rem clamp(1rem, 4vw, 2rem);
        text-align: center;
        font-size: 0.8rem;
        color: var(--nf-muted);
        border-top: 1px solid color-mix(in srgb, var(--nf-border) 18%, transparent);
      }
    </style>
  </head>
  <body>
    <header class="nf-header">
      <a class="nf-brand" href="/">No Bhad Codes</a>
      <button type="button" class="nf-theme" id="nf-theme-toggle" aria-label="Toggle theme">
        <svg class="icon-sun" viewBox="0 0 24 24" aria-hidden="true">
          <circle cx="12" cy="12" r="4"></circle>
          <path
            d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"
          ></path>
        </svg>
        <svg class="icon-moon" viewBox="0 0 24 24" aria-hidden="true">
          <path d="M21 14.5A8.5 8.5 0 1 1 9.5 3 7 7 0 0 0 21 14.5z"></path>
        </svg>
      </button>
    </header>

    <main class="nf-main">
      <div class="nf-card">
        <img
          class="nf-sign"
          src="/images/wile_404_sign.svg"
          width="997"
          height="919"
          alt="Hand-painted Acme-style road sign reading 404 Work In Progress"
        />
        <div class="nf-copy">
          <p class="nf-eyebrow">Channel lost</p>
          <h1 class="nf-title">That was a painted tunnel.</h1>
          <p class="nf-body">
            You followed a link straight into a tunnel painted on a rock wall — no page behind it,
            just the wall. Happens to the best of us. Take the scenic route back.
          </p>
        </div>
        <div class="nf-actions">
          <a class="nf-btn nf-btn--primary" href="/">Home</a>
          <a class="nf-btn nf-btn--ghost" href="/#/projects">Projects</a>
          <a class="nf-btn nf-btn--ghost" href="/#/contact">Contact</a>
        </div>
      </div>
    </main>

    <footer class="nf-footer">
      <p>&copy; <span id="nf-year"></span> No Bhad Codes. All rights reserved.</p>
    </footer>

    <script>
      document.getElementById('nf-year').textContent = new Date().getFullYear();
      document.getElementById('nf-theme-toggle').addEventListener('click', function () {
        var next =
          document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        try {
          localStorage.setItem('theme', next);
        } catch (e) {}
        var meta = document.querySelector('meta[name="theme-color"]');
        if (meta) meta.setAttribute('content', next === 'dark' ? '#333333' : '#e0e0e0');
      });
    </script>
  </body>
</html>
